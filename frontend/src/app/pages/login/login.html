<h1 class="title-main">🚀 Acceso al Sistema</h1>

<div class="login-page">
  <div class="login-card">

    <!-- Encabezado -->
    <div class="login-header">
      <div class="logo-icon">✨</div>
      <h1>Iniciar Sesión</h1>
      <p>Accede con tu cuenta para continuar</p>
    </div>

    <!-- Error -->
    <div class="alert-error" *ngIf="errorMensaje">
      ❌ {{ errorMensaje }}
    </div>

    <!-- Formulario -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

      <!-- Usuario -->
      <div class="form-group">
        <label for="username">🧑 Usuario</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="Tu usuario"
          [class.input-error]="f['username'].touched && f['username'].invalid">

        <span class="error-msg"
          *ngIf="f['username'].touched && f['username'].errors?.['required']">
          Campo obligatorio
        </span>
      </div>

      <!-- Contraseña -->
      <div class="form-group">
        <label for="password">🔑 Contraseña</label>

        <div class="input-with-btn">
          <input
            id="password"
            [type]="mostrarPass ? 'text' : 'password'"
            formControlName="password"
            placeholder="Tu contraseña"
            [class.input-error]="f['password'].touched && f['password'].invalid">

          <button type="button" class="btn-toggle" (click)="togglemostrarPass()">
            {{ mostrarPass ? "🙈" : "👁️" }}
          </button>
        </div>

        <span class="error-msg"
          *ngIf="f['password'].touched && f['password'].errors?.['required']">
          Campo obligatorio
        </span>
      </div>

      <!-- Botón -->
      <button type="submit" class="btn-login" [disabled]="cargando">
        🚀 Entrar ahora
      </button>
      <p>
        ¿No tienes cuenta?
       <button routerLink="/registro">
          Crear cuenta
      </button>
    </p>

    </form>

  </div>
</div>
